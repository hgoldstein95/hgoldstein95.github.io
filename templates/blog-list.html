{% extends "base.html" %}

{% block content %}
  <h2>Blog Posts</h2>

  <ul class="post-list">
    {% for page in section.pages %}
      <li>
        <h3 style="display: inline-block;">
          <a class="post-link" href="{{ page.permalink }}">
            {{ page.title }}
          </a>
        </h3>
        <span class="post-meta">{{ page.date | date(format="%b %-d, %Y") }}</span>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
